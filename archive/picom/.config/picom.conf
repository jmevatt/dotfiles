# ─────────────────────────────────────────────────────────────────────────────
# picom config — Helicon
# ─────────────────────────────────────────────────────────────────────────────

# ── Backend ──────────────────────────────────────────────────────────────────
backend = "glx";
vsync   = true;

# ── Shadows ──────────────────────────────────────────────────────────────────
shadow          = true;
shadow-radius   = 12;
shadow-offset-x = -12;
shadow-offset-y = -12;
shadow-opacity  = 0.6;

shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'Conky'",
  "class_g = 'dunst'",
  "class_g ?= 'Notify-osd'",
  "_GTK_FRAME_EXTENTS@",
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

# ── Fading ────────────────────────────────────────────────────────────────────
fading        = true;
fade-in-step  = 0.06;
fade-out-step = 0.06;
fade-delta    = 5;

# ── Transparency ─────────────────────────────────────────────────────────────
inactive-opacity         = 1.0;
active-opacity           = 1.0;
frame-opacity            = 1.0;
inactive-opacity-override = false;

opacity-rule = [
  "100:fullscreen",
  "85:class_g = 'kitty'",
  "85:class_g = 'Kitty'"
];

# ── Blur ─────────────────────────────────────────────────────────────────────
blur-method          = "dual_kawase";
blur-strength        = 5;
blur-background      = false;   # flip to true if you want blurred bg on transparent windows
blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "_GTK_FRAME_EXTENTS@"
];

# ── Corners ───────────────────────────────────────────────────────────────────
corner-radius = 8;
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

# ── General ───────────────────────────────────────────────────────────────────
mark-wmwin-focused   = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity  = true;
detect-transient       = true;
use-damage             = false;  # NVIDIA: disable to avoid artifacts
log-level = "warn";

wintypes:
{
  tooltip      = { fade = true; shadow = false; opacity = 0.9; focus = true; full-shadow = false; };
  dock         = { shadow = false; clip-shadow-above = true; };
  dnd          = { shadow = false; };
  popup_menu   = { opacity = 1.0; };
  dropdown_menu = { opacity = 1.0; };
  notification = { shadow = false; };
};
