include-file = $HOME/.config/polybar/colors.ini

[settings]
screenchange-reload = true
pseudo-transparency = true

; ── Bar ───────────────────────────────────────────────────────────────────────
[bar/main]
monitor = ${env:MONITOR:}
bottom = false
fixed-center = true

width  = 100%
height = 32

background = ${color.background}
foreground = ${color.foreground}

border-top-size    = 0
border-left-size   = 0
border-right-size  = 0

font-0 = "JetBrainsMono Nerd Font:size=11;3"
font-1 = "JetBrainsMono Nerd Font:style=Bold:size=11;3"
font-2 = "JetBrainsMono Nerd Font:size=16;4"

modules-left   = pill-l i3 pill-r
modules-center = pill-l date pill-r
modules-right  = pill-l cpu gap temperature gap ram gap disk pill-r spc pill-l ethernet gap volume pill-r spc tray

enable-ipc = true
cursor-click  = pointer
cursor-scroll = ns-resize
wm-name = i3

; ── Decorators ────────────────────────────────────────────────────────────────
[module/pill-l]
type = custom/text
format-background = ${color.transparent}
format-foreground = ${color.background}
format =
format-font = 3

[module/pill-r]
type = custom/text
format-background = ${color.transparent}
format-foreground = ${color.background}
format =
format-font = 3

[module/spc]
type = custom/text
format = " "

[module/gap]
type = custom/text
format-background = ${color.background}
format-foreground = ${color.black}
format = " │ "

; ── Tray ─────────────────────────────────────────────────────────────────────
[module/tray]
type = internal/tray
format-background = ${color.transparent}
tray-background    = ${color.transparent}
tray-foreground    = ${color.foreground}
tray-padding       = 4px
tray-spacing       = 2px
tray-size          = 70%

; ── i3 workspaces ─────────────────────────────────────────────────────────────
[module/i3]
type = internal/i3

pin-workspaces = true
show-urgent    = true
index-sort     = true
enable-click   = true
enable-scroll  = true

ws-icon-0  = 1;󰆍
ws-icon-1  = 2;󰖟
ws-icon-2  = 3;󰨞
ws-icon-3  = 4;󰉋
ws-icon-4  = 5;󰍦
ws-icon-5  = 6;6
ws-icon-6  = 7;7
ws-icon-7  = 8;8
ws-icon-8  = 9;9
ws-icon-9  = 10;󰝚
ws-icon-default =

format = <label-state><label-mode>

label-mode            = %mode%
label-mode-padding    = 1
label-mode-background = ${color.background}
label-mode-foreground = ${color.foreground}

label-focused            = %icon%
label-focused-foreground = ${color.purple}
label-focused-background = ${color.background}
label-focused-underline  = ${color.purple}
label-focused-padding    = 2

label-unfocused            = %icon%
label-unfocused-padding    = 2
label-unfocused-background = ${color.background}
label-unfocused-foreground = ${color.black}

label-visible            = %icon%
label-visible-underline  = ${color.cyan}
label-visible-padding    = 2
label-visible-foreground = ${color.cyan}
label-visible-background = ${color.background}

label-urgent            = %icon%
label-urgent-foreground = ${color.red}
label-urgent-background = ${color.background}
label-urgent-padding    = 2

; ── Date ─────────────────────────────────────────────────────────────────────
[module/date]
type = internal/date
interval = 1

date     = %a %d %b
time     = %I:%M %p
date-alt = %A %d %B %Y
time-alt = %I:%M:%S %p

format            = <label>
format-prefix     = "󰃰 "
format-prefix-foreground = ${color.pink}
format-background = ${color.background}

label = %date%  %time%

; ── CPU ──────────────────────────────────────────────────────────────────────
[module/cpu]
type = internal/cpu
interval = 1

format            = <label>
format-prefix     = " "
format-prefix-foreground = ${color.green}
format-background = ${color.background}
label             = %percentage%%

; ── Temperature ──────────────────────────────────────────────────────────────
[module/temperature]
type = internal/temperature
interval = 1

; Run: for f in /sys/class/hwmon/hwmon*/name; do echo "$f: $(cat $f)"; done
; then pick the hwmon path for k10temp (AMD) or coretemp (Intel)
; hwmon-path = /sys/devices/pci0000:00/0000:00:18.3/hwmon/hwmon2/temp1_input
thermal-zone     = 0
base-temperature = 20
warn-temperature = 85
units = true

format            = <ramp> <label>
format-background = ${color.background}
format-warn       = <ramp> <label-warn>
format-warn-background = ${color.background}

label                  = %temperature-c%
label-warn             = %temperature-c%
label-warn-foreground  = ${color.red}

ramp-0            =
ramp-1            =
ramp-2            =
ramp-3            =
ramp-4            =
ramp-0-foreground = ${color.cyan}
ramp-1-foreground = ${color.green}
ramp-2-foreground = ${color.yellow}
ramp-3-foreground = ${color.orange}
ramp-4-foreground = ${color.red}

; ── RAM ──────────────────────────────────────────────────────────────────────
[module/ram]
type = internal/memory
interval = 2

format            = <label>
format-prefix     = " "
format-prefix-foreground = ${color.purple}
format-background = ${color.background}
label             = %gb_used%

; ── Disk ─────────────────────────────────────────────────────────────────────
[module/disk]
type = internal/fs
mount-0 = /
interval = 10

format-mounted            = <label-mounted>
format-mounted-prefix     = "󰋊 "
format-mounted-prefix-foreground = ${color.yellow}
format-mounted-background = ${color.background}
label-mounted             = %free% free

; ── Ethernet ─────────────────────────────────────────────────────────────────
; Run: ip link | grep -E '^[0-9]+: e' to find your interface name
[module/ethernet]
type = internal/network
interface = enp11s0u3
interval  = 2

accumulate-stats = true
unknown-as-up    = true

format-connected            = <label-connected>
format-connected-prefix     = "󰈀 "
format-connected-prefix-foreground = ${color.blue}
format-connected-background = ${color.background}
label-connected             = %ifname% %downspeed%

format-disconnected            = <label-disconnected>
format-disconnected-prefix     = "󰈂 "
format-disconnected-prefix-foreground = ${color.red}
format-disconnected-background = ${color.background}
label-disconnected             = down

; ── Volume ───────────────────────────────────────────────────────────────────
[module/volume]
type = internal/pulseaudio
interval = 2
use-ui-max = false

format-volume            = <ramp-volume> <label-volume>
format-volume-background = ${color.background}
format-muted             = <label-muted>
format-muted-background  = ${color.background}

label-volume       = %percentage%%
label-muted        = 󰖁 muted
label-muted-foreground = ${color.red}

ramp-volume-0            = 󰕿
ramp-volume-1            = 󰖀
ramp-volume-2            = 󰕾
ramp-volume-foreground   = ${color.cyan}

click-right = pavucontrol &
