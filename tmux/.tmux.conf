# Address vim mode switching delay (http://superuser.com/a/252717/65504)
set -s escape-time 0

# Increase scrollback buffer size from 2000 to 50000 lines
set -g history-limit 50000

# Increase tmux messages display duration from 750ms to 4s
set -g display-time 4000

# Refresh 'status-left' and 'status-right' more often, from every 15s to 5s
set -g status-interval 5

# Upgrade $TERM — tmux-256color supports italics + modern mouse; kitty passes true-color via override
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm-kitty:RGB"
set -as terminal-overrides ",*:Smulx=\\E[4::%p1%dm"
set -as terminal-overrides ",*:Setulc=\\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m"

# Emacs key bindings in tmux command prompt (prefix + :) are better than
# vi keys, even for vim users
set -g status-keys emacs

# Focus events enabled for terminals that support them
set -g focus-events on

# Super useful when using "grouped sessions" and multi-monitor setup
setw -g aggressive-resize on

# Mouse support — scroll wheel, click-to-select-pane, drag-to-select-text
# Hold Shift while selecting to bypass tmux and use kitty's native clipboard
set -g mouse on

# Force scroll wheel to pass through to alt-screen apps (claude-code, vim, less, etc.)
# instead of entering tmux's own copy-mode. Normal terminal -> enter copy-mode.
bind-key -T root WheelUpPane   if-shell -F -t = "#{alternate_on}" "send-keys -M" "copy-mode -e; send-keys -M"
bind-key -T root WheelDownPane if-shell -F -t = "#{alternate_on}" "send-keys -M" "send-keys -M"

# Middle-click pastes X11 PRIMARY selection (matches native desktop behavior).
# On Wayland, swap `xclip -o -selection primary` for `wl-paste --primary`.
bind-key -T root MouseDown2Pane run-shell "xclip -o -selection primary | tmux load-buffer - ; tmux paste-buffer"

# Clipboard integration (Wayland — uses wl-copy)
set -g set-clipboard on
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy"
bind -T copy-mode    y send -X copy-pipe-and-cancel "wl-copy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "wl-copy"
bind -T copy-mode    MouseDragEnd1Pane send -X copy-pipe-and-cancel "wl-copy"

bind C-p previous-window
bind C-n next-window
bind R source-file '~/.tmux.conf'
set -g status-right "#[fg=cyan]%A, %d %b %Y %I:%M %p"
