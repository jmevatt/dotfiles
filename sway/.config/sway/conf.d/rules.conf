# Per-app window rules. `swaymsg -t get_tree` to discover app_id / class.

for_window [app_id="pavucontrol"]            floating enable, resize set 600 400
for_window [app_id="org.gnome.Calculator"]   floating enable
for_window [app_id="blueman-manager"]        floating enable
for_window [title="Picture-in-Picture"]      floating enable, sticky enable
for_window [window_role="pop-up"]            floating enable
for_window [window_role="dialog"]            floating enable

# Tag inhibitors so video stays awake
for_window [app_id="firefox"]   inhibit_idle fullscreen
for_window [app_id="mpv"]       inhibit_idle visible
