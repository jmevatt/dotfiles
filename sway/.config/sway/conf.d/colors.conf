# Single source of truth for sway colors.
# Waybar/wofi/mako can mirror these manually until you wire up a generator.

set $bg        #1e1e2e
set $bg_alt    #313244
set $fg        #cdd6f4
set $fg_dim    #a6adc8
set $accent    #cba6f7
set $accent_alt #f5c2e7
set $urgent    #f38ba8
set $border    #45475a

# class                 border       background  text     indicator   child_border
client.focused          $accent      $bg_alt     $fg      $accent_alt $accent
client.focused_inactive $border      $bg         $fg_dim  $border     $border
client.unfocused        $border      $bg         $fg_dim  $border     $border
client.urgent           $urgent      $urgent     $bg      $urgent     $urgent
