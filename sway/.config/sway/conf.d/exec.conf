# Autostart. exec_always re-runs on `swaymsg reload`.

exec_always pkill -x waybar; waybar
exec        mako

# Idle: lock only — no DPMS power-off.
# NVIDIA + wlroots atomic modeset has a known bug where `output * power off`
# can leave one display in a wedged state that won't wake cleanly, and
# swaylock then fails to render on it. Skip the power-off; let the panels'
# own idle handle real power savings.
exec swayidle -w \
    timeout 300  'swaylock -f' \
    before-sleep 'swaylock -f'

# Portal stack for screen-sharing / file pickers
exec /usr/lib/xdg-desktop-portal-wlr &
exec /usr/lib/xdg-desktop-portal &

# Tailscale tray (if installed)
# exec tailscale-systray
