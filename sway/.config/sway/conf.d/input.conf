# Run `swaymsg -t get_inputs` to discover device identifiers if you need
# per-device tuning. Wildcards below cover the workstation case.

input "type:keyboard" {
    xkb_layout us
    xkb_options ctrl:nocaps
    repeat_delay 250
    repeat_rate 40
}

input "type:mouse" {
    accel_profile flat
    pointer_accel 0
}
