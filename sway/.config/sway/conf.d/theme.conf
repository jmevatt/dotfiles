font pango:JetBrainsMono Nerd Font 10

default_border pixel 2
default_floating_border pixel 2
hide_edge_borders smart

gaps inner 6
gaps outer 2
smart_gaps on
smart_borders on

# Ultrawide-friendly: new workspaces default to tabbed (full-width windows,
# tab bar at top). $mod+e toggles back to split tiling per-workspace.
workspace_layout tabbed
