# ╔══════════════════════════════════════════════════════════════╗
# ║  Hyprland Config — Evatt Labs / Helicon                     ║
# ║  Floating-first layout + full desktop tooling               ║
# ╚══════════════════════════════════════════════════════════════╝

################
### MONITORS ###
################

# ASUS ultrawide (left) → Acer 27" (right)
monitor = DP-4, 3440x1440@165, 0x0, 1
monitor = HDMI-A-2, 2560x1440@144, 3440x0, 1
# Fallback for any other monitors
monitor = , preferred, auto, auto


###################
### MY PROGRAMS ###
###################

$terminal    = kitty
$fileManager = thunar
$menu        = walker
$browser     = zen-browser


#################
### AUTOSTART ###
#################

# Shell — vex-shell (Quickshell fork of caelestia) handles bar, dock, notifs, launcher, OSDs, wallpaper
exec-once = qs -c caelestia -d

# Polkit agent (privilege escalation dialogs)
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# Keyring
exec-once = gnome-keyring-daemon --start --components=secrets,pkcs11

# Clipboard history
exec-once = wl-paste --watch cliphist store

# Idle management → lock after 5 min, screen off after 10 min
exec-once = hypridle

# No KVM autostart — work MBP uses ssh-over-Tailscale instead (security policy)

# System tray items (shown inside vex-shell's tray module)
exec-once = nm-applet --indicator
exec-once = blueman-applet

# App launcher — walker (Ctrl+Space) backed by elephant daemon, kept as alt to vex-shell's launcher
exec-once = elephant

# Portal for screen sharing / file dialogs
exec-once = /usr/lib/xdg-desktop-portal-hyprland


#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt6ct
env = GDK_BACKEND,wayland,x11
env = XDG_DATA_DIRS,/usr/local/share:/usr/share:/var/lib/flatpak/exports/share

# Nvidia
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct
env = GBM_BACKEND,nvidia-drm
env = ELECTRON_OZONE_PLATFORM_HINT,auto

cursor {
    no_hardware_cursors = true
    no_warps = true
}


###################
### PERMISSIONS ###
###################

# Uncomment and restart Hyprland if you enable enforce_permissions
# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow


#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 5
    gaps_out = 15

    border_size = 2

    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    resize_on_border = true
    allow_tearing = false

    # 🎯 Floating-first layout
    layout = dwindle
}

decoration {
    rounding = 10
    rounding_power = 2

    active_opacity = 1.0
    inactive_opacity = 0.95

    shadow {
        enabled = true
        range = 8
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 4
        passes = 2
        vibrancy = 0.2
    }
}

animations {
    enabled = yes, please :)

    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     1.94,  almostLinear, fade
    animation = workspacesIn,  1,     1.21,  almostLinear, fade
    animation = workspacesOut, 1,     1.94,  almostLinear, fade
    animation = zoomFactor,    1,     7,     quick
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}


#############
### INPUT ###
#############

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = false
    }
}

gesture = 3, horizontal, workspace

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


##########################
### KEYBINDINGS — CORE ###
##########################

$mainMod = SUPER

# Launch
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, B, exec, $browser

# vex-shell drawers (open on focused monitor via Visibilities.getForActive())
bind = $mainMod,       Space,  global, vex:launcher
bind = $mainMod SHIFT, Space,  exec,   $menu
bind = $mainMod,       D,      global, vex:dashboard
bind = $mainMod,       N,      global, vex:sidebar
bind = $mainMod,       A,      global, vex:controlCenter
bind = $mainMod,       U,      global, vex:utilities
bind = $mainMod,       Escape, global, vex:session
bind = $mainMod SHIFT, S,      global, vex:showall

# Window management
bind = $mainMod, K, killactive,
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, V, togglefloating,
bind = $mainMod, P, pseudo,
bind = $mainMod, J, layoutmsg, togglesplit
bind = $mainMod, T, exec, $terminal

# Center floating window
bind = $mainMod, G, centerwindow,

# Move focus
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

# Move floating windows
bind = $mainMod SHIFT, left,  moveactive, -50 0
bind = $mainMod SHIFT, right, moveactive, 50 0
bind = $mainMod SHIFT, up,    moveactive, 0 -50
bind = $mainMod SHIFT, down,  moveactive, 0 50

# Resize floating windows
bind = $mainMod CTRL, left,  resizeactive, -50 0
bind = $mainMod CTRL, right, resizeactive, 50 0
bind = $mainMod CTRL, up,    resizeactive, 0 -50
bind = $mainMod CTRL, down,  resizeactive, 0 50


##############################
### KEYBINDINGS — SCREENSHOTS ###
##############################

# macOS-style — vex-shell integrated, freezes screen on select, auto-copies to clipboard
bind = ALT SHIFT, 4, exec, caelestia screenshot -rf
bind = ALT SHIFT, 3, exec, caelestia screenshot -f


###################################
### KEYBINDINGS — CLIPBOARD     ###
###################################

# Clipboard history picker
bind = $mainMod, V, exec, cliphist list | walker --dmenu | cliphist decode | wl-copy

# Clear clipboard history
bind = $mainMod SHIFT, V, exec, cliphist wipe


#################################
### KEYBINDINGS — LOCK/POWER  ###
#################################

bind = $mainMod, L, exec, hyprlock


################################
### KEYBINDINGS — MEDIA KEYS ###
################################

bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp,   exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

bindl = , XF86AudioNext,  exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay,  exec, playerctl play-pause
bindl = , XF86AudioPrev,  exec, playerctl previous


##########################
### WORKSPACES         ###
##########################

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scratchpad
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize with mouse — uses ALT to dodge ROG Scope II 96 firmware bug that phantom-releases LEFTMETA while held
bindm = ALT, mouse:272, movewindow
bindm = ALT, mouse:273, resizewindow


##############################
### WINDOW RULES           ###
##############################

# 🎯 ALL windows float by default
windowrule {
    name = float-all
    match:class = .*
    float = on
}

# Suppress maximize requests
windowrule {
    name = suppress-maximize
    match:class = .*
    suppress_event = maximize
}

# Terminal apps: 80x24 standard default
windowrule {
    name = terminal-size
    match:class = ^(kitty|Alacritty|foot|xterm|urxvt|st-256color|org\.wezfurlong\.wezterm)$
    size = 660 480
    center = on
}

# Browsers: remember resized size across launches
windowrule {
    name = browser-persistent
    match:class = ^(zen|zen-beta|firefox|chromium|google-chrome)$
    persistent_size = on
}

# All windows: remember resized size across launches
windowrule {
    name = persistent-size-all
    match:class = .*
    persistent_size = on
}

# Default size for other floating windows
windowrule {
    name = default-float-size
    match:class = .*
    size = 60% 70%
    center = on
}

# Dialogs/popups: smaller + centered
windowrule {
    name = dialog-float
    match:title = (Open|Save|File|Folder|Dialog|Pick|Choose|Select)
    size = 800 500
    center = on
}

# pavucontrol
windowrule {
    name = pavucontrol-size
    match:class = ^(pavucontrol)$
    size = 700 500
    center = on
}

# blueman
windowrule {
    name = blueman-size
    match:class = ^(blueman-manager)$
    size = 600 400
    center = on
}


##############################
### PLUGINS                ###
##############################

plugin {
    hyprbars {
        bar_height = 26
        bar_color = rgb(1a1a1a)
        col.text = rgba(ffffffdd)
        bar_text_size = 11
        bar_text_font = JetBrainsMono Nerd Font
        bar_padding = 10
        bar_button_padding = 6
        bar_precedence_over_border = false
        bar_part_of_window = true

        # macOS-style traffic lights (right to left: close / maximize / float toggle)
        hyprbars-button = rgb(ff5f56), 12, , hyprctl dispatch killactive
        hyprbars-button = rgb(ffbd2e), 12, , hyprctl dispatch fullscreen 1
        hyprbars-button = rgb(27c93f), 12, , hyprctl dispatch togglefloating
    }
}
