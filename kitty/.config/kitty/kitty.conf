# ── Behavior ──────────────────────────────────────────────────────────────────
mouse_hide_wait          3
confirm_os_window_close  0
enable_audio_bell        no

# ── Remote control (required for nnn preview-tui) ────────────────────────────
allow_remote_control     yes
listen_on                unix:/tmp/kitty

# ── Window ────────────────────────────────────────────────────────────────────
window_padding_width  6 10
initial_window_width  80c
initial_window_height 24c
remember_window_size  no

# ── Font ─────────────────────────────────────────────────────────────────────
font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
font_size        11.5

# ── Catppuccin Mocha ──────────────────────────────────────────────────────────
background            #1e1e2e
foreground            #cdd6f4
selection_background  #585b70
selection_foreground  #cdd6f4
cursor                #f5e0dc
cursor_text_color     #1e1e2e
url_color             #89b4fa

# Normal
color0  #45475a
color1  #f38ba8
color2  #a6e3a1
color3  #f9e2af
color4  #89b4fa
color5  #cba6f7
color6  #89dceb
color7  #bac2de

# Bright
color8  #585b70
color9  #f38ba8
color10 #a6e3a1
color11 #f9e2af
color12 #89b4fa
color13 #cba6f7
color14 #89dceb
color15 #a6adc8

# ── Transparency ─────────────────────────────────────────────────────────────
background_opacity 1.0

# ── Tabs ─────────────────────────────────────────────────────────────────────
map ctrl+t new_tab
map ctrl+w close_tab
map ctrl+shift+right next_tab
map ctrl+shift+left  previous_tab

# ── Symbols ──────────────────────────────────────────────────────────────────
symbol_map U+E000-U+F8FF,U+1F000-U+1FAFF,U+2600-U+27BF,U+2300-U+23FF Noto Color Emoji
symbol_map U+3000-U+303F,U+3040-U+309F,U+30A0-U+30FF,U+4E00-U+9FFF,U+FF00-U+FFEF Noto Sans CJK JP
